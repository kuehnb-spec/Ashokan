<!DOCTYPE html>
<!--
  CONTEXT.html — single-file project dashboard / source of truth.

  HOW IT WORKS
  - All state lives in the JSON block (id="ctx-data") below. Edit THAT, not the markup.
  - The inline script renders it. The file opens standalone in any browser, no build, no network.
  - The central index server (~/Projects/_dashboard/server.py) reads the SAME JSON block
    from every project's CONTEXT.html to build the all-projects view.

  AGENT CONVENTION
  - At session start: read this file to load project context.
  - At session end: update "updated", "status", "summary", and the next/decisions lists.
  - Set "private": true to keep a project off any public/shared surface (Tailscale view still shows it).

  FIELDS: status ∈ idea | active | paused | blocked | shipped
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Context</title>

<script id="ctx-data" type="application/json">
{
  "project": "Ashokan",
  "tagline": "A simple, fast, native WYSIWYG editor for HTML documents on the Mac.",
  "status": "active",
  "updated": "2026-07-07",
  "private": false,
  "tags": ["macos", "swift", "appkit", "prosemirror", "editor", "html"],
  "summary": "v0.1 built, visually verified (screenshots), launch bugs fixed: NSDocument-based AppKit app with WKWebView+ProseMirror WYSIWYG pane and toggleable native source pane (⌘/). Lossless round-trip works (11/11 headless fidelity checks). Demo memo renders with its own stylesheet in a native window with full toolbar. Roadmap brainstormed with Brant → docs/ROADMAP.html: review mode (tracked changes as standard ins/del + comments), images/tables, print-quality PDF export, recents launcher with thumbnails, iOS companion via iCloud Drive.",
  "next": [
    { "text": "Brant: try the app (it's open with samples/demo-memo.html) and pick the first roadmap feature to build. Recommended order: images/tables → recents launcher → PDF export → review mode → iOS.", "priority": "high" },
    { "text": "Images & tables: insert/drag/paste images (data-URI default), figure/figcaption, table grid picker + row/col/merge commands.", "priority": "med" },
    { "text": "Recents launcher: welcome window with thumbnail cards (WKWebView snapshots), filename + path + date.", "priority": "med" },
    { "text": "PDF export with pagination CSS (break-inside: avoid, heading break-after: avoid, @page).", "priority": "med" },
    { "text": "Review mode: Suggesting-mode ProseMirror plugin writing standard ins/del markup, comments as mark+title+JSON island, Review toolbar with accept/reject.", "priority": "med" }
  ],
  "open_questions": [
    "Distribution: direct download with Developer ID signing, or personal use only for now?",
    "Should the source pane get CodeMirror (richer) or stay native NSTextView (lighter)?"
  ],
  "decisions": [
    { "date": "2026-07-07", "text": "Native Swift/AppKit shell + WKWebView (system HTML engine, not Electron) hosting a ProseMirror editing core. The document IS HTML, so true WYSIWYG means rendering with a real HTML engine. Also sets up a future iOS app reusing the same core." },
    { "date": "2026-07-07", "text": "Document-based app (each file its own window, like Word/Typora), not a workspace/sidebar app. Sidebar can come later." },
    { "date": "2026-07-07", "text": "Core product promise: lossless round-trip. Never rewrite what the user didn't edit; unknown markup survives as protected islands." },
    { "date": "2026-07-07", "text": "Untitled windows opt out of macOS state restoration until saved — template-bearing untitled docs were being preserved as drafts and resurrected on every launch." },
    { "date": "2026-07-07", "text": "Tracked changes will use standard HTML ins/del elements and comments will use mark + title + a JSON island — review data stays readable in any browser, no sidecar files." }
  ],
  "links": [
    { "label": "README", "href": "README.md" },
    { "label": "Roadmap & feature design", "href": "docs/ROADMAP.html" },
    { "label": "Demo memo (test doc)", "href": "samples/demo-memo.html" },
    { "label": "Editing core", "href": "editor/src/editor.js" }
  ]
}
</script>

<style>
  :root {
    --bg: #0f1115; --card: #171a21; --line: #262b36; --fg: #e6e8ed; --mut: #9aa3b2;
    --accent: #6ea8fe;
    --idea:#8b95a7; --active:#3fb950; --paused:#d29922; --blocked:#f85149; --shipped:#6ea8fe;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f6f7f9; --card:#fff; --line:#e4e7ec; --fg:#1a1d23; --mut:#5b6472; --accent:#1f6feb; }
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }
  header { display:flex; align-items:flex-start; gap:16px; flex-wrap:wrap; }
  h1 { font-size: 28px; margin:0; letter-spacing:-.02em; }
  .tagline { color:var(--mut); margin:6px 0 0; }
  .badge { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.04em;
    padding:4px 10px; border-radius:999px; color:#0b0d11; white-space:nowrap; }
  .meta { color:var(--mut); font-size:13px; margin-top:8px; }
  .stale { color: var(--blocked); font-weight:600; }
  section { margin-top:28px; }
  h2 { font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--mut);
    margin:0 0 10px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
  .summary { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; }
  ul { margin:0; padding:0; list-style:none; }
  li { padding:9px 0; border-top:1px solid var(--line); display:flex; gap:10px; align-items:baseline; }
  li:first-child { border-top:0; }
  .pri { font-size:11px; font-weight:700; text-transform:uppercase; padding:2px 7px; border-radius:6px;
    border:1px solid var(--line); color:var(--mut); white-space:nowrap; }
  .pri.high { color:var(--blocked); border-color:var(--blocked); }
  .pri.med { color:var(--paused); border-color:var(--paused); }
  .dec-date { color:var(--mut); font-variant-numeric:tabular-nums; white-space:nowrap; min-width:88px; }
  a { color:var(--accent); }
  .chips { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { font-size:12px; color:var(--mut); border:1px solid var(--line); border-radius:999px; padding:3px 9px; }
  .priv { color:var(--mut); }
  footer { margin-top:40px; color:var(--mut); font-size:12px; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
(function () {
  const d = JSON.parse(document.getElementById('ctx-data').textContent);
  document.title = d.project + " — Context";
  const colors = { idea:'--idea', active:'--active', paused:'--paused', blocked:'--blocked', shipped:'--shipped' };
  const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

  // days since updated
  let staleNote = '';
  const days = Math.floor((Date.now() - Date.parse(d.updated)) / 864e5);
  if (!isNaN(days)) staleNote = days <= 0 ? 'today' : days === 1 ? '1 day ago' : days + ' days ago';
  const isStale = days > 21;

  const sec = (title, html) => html ? `<section><h2>${title}</h2>${html}</section>` : '';
  const list = (arr, fn) => arr && arr.length ? `<ul class="card">${arr.map(fn).join('')}</ul>` : '';

  document.getElementById('app').innerHTML = `
    <header>
      <div style="flex:1; min-width:240px;">
        <h1>${esc(d.project)}</h1>
        <p class="tagline">${esc(d.tagline||'')}</p>
        <p class="meta">Updated <strong class="${isStale?'stale':''}">${staleNote}</strong>
          <span style="opacity:.6">· ${esc(d.updated)}</span>
          ${d.private ? '<span class="priv"> · private — not for public surfaces</span>' : ''}
        </p>
      </div>
      <span class="badge" style="background:var(${colors[d.status]||'--idea'})">${esc(d.status||'idea')}</span>
    </header>

    ${d.summary ? `<section><h2>Status</h2><div class="summary">${esc(d.summary)}</div></section>` : ''}

    ${sec('Next actions', list(d.next, x =>
      `<li><span class="pri ${x.priority||''}">${esc(x.priority||'todo')}</span><span>${esc(x.text)}</span></li>`))}

    ${sec('Open questions', list(d.open_questions, x => `<li><span>${esc(x)}</span></li>`))}

    ${sec('Decisions', list(d.decisions, x =>
      `<li><span class="dec-date">${esc(x.date||'')}</span><span>${esc(x.text)}</span></li>`))}

    ${sec('Links', d.links && d.links.length
      ? `<div class="card"><ul>${d.links.map(l =>
          `<li><a href="${esc(l.href)}">${esc(l.label)}</a></li>`).join('')}</ul></div>` : '')}

    ${d.tags && d.tags.length
      ? `<section><div class="chips">${d.tags.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div></section>` : ''}

    <footer>Single-file project context · edit the JSON block in this file's source.</footer>
  `;
})();
</script>
</body>
</html>
