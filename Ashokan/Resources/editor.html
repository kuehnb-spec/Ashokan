<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style id="ashokan-chrome">
  /* Editor chrome — required ProseMirror styles plus Ashokan's raw-island UI.
     Kept deliberately minimal so the document's own stylesheet dominates. */
  html, body { height: 100%; }
  body { margin: 0; }
  #editor { min-height: 100%; }
  .ProseMirror {
    white-space: pre-wrap;
    word-wrap: break-word;
    outline: none;
    min-height: 100vh;
    box-sizing: border-box;
    -webkit-font-variant-ligatures: none;
  }
  .ProseMirror pre { white-space: pre-wrap; }
  .ProseMirror li { position: relative; }
  .ProseMirror img.ProseMirror-separator { display: inline !important; border: none !important; margin: 0 !important; }
  .ProseMirror-selectednode { outline: 2px solid #6ea8fe; outline-offset: 2px; border-radius: 2px; }
  .ProseMirror-gapcursor { display: none; pointer-events: none; position: absolute; }
  .ProseMirror-gapcursor:after {
    content: ""; display: block; position: absolute; top: -2px; width: 20px;
    border-top: 1px solid black; animation: ProseMirror-cursor-blink 1.1s steps(2, start) infinite;
  }
  @keyframes ProseMirror-cursor-blink { to { visibility: hidden; } }
  .ProseMirror-focused .ProseMirror-gapcursor { display: block; }
  .ProseMirror .tableWrapper { overflow-x: auto; }
  .ProseMirror table { border-collapse: collapse; table-layout: fixed; width: 100%; overflow: hidden; }
  .ProseMirror td, .ProseMirror th { vertical-align: top; box-sizing: border-box; position: relative; }
  .ProseMirror .column-resize-handle {
    position: absolute; right: -2px; top: 0; bottom: 0; width: 4px; z-index: 20;
    background-color: #6ea8fe; pointer-events: none;
  }
  .ProseMirror .selectedCell:after {
    z-index: 2; position: absolute; content: ""; left: 0; right: 0; top: 0; bottom: 0;
    background: rgba(110, 168, 254, 0.22); pointer-events: none;
  }

  /* Preserved-HTML islands: normal rendering, gentle indicator on hover. */
  .ashokan-raw { position: relative; border-radius: 3px; }
  .ashokan-raw--inline { display: inline; }
  .ashokan-raw:hover { box-shadow: 0 0 0 1px rgba(110, 168, 254, 0.55); cursor: default; }

  /* Review mode: tracked changes and comments. Plain browsers already render
     ins/del/mark sensibly; these refine the look inside Ashokan. */
  .ProseMirror ins {
    background: rgba(46, 160, 67, 0.13);
    text-decoration: underline;
    text-decoration-color: #2ea043;
    text-decoration-thickness: 1.5px;
  }
  .ProseMirror del {
    background: rgba(248, 81, 73, 0.09);
    text-decoration: line-through;
    text-decoration-color: #f85149;
  }
  .ProseMirror mark[title] {
    background: rgba(255, 214, 10, 0.35);
    border-bottom: 1.5px dotted #b08800;
    cursor: help;
  }

  /* Comments margin: cards aligned with their anchors in the right rail. */
  body.ashokan-comments-margin #editor { padding-right: 240px; }
  #ashokan-comment-rail { position: absolute; top: 0; right: 0; width: 224px; z-index: 40; }
  .ashokan-comment-card {
    position: absolute; right: 10px; width: 200px; box-sizing: border-box;
    background: #fffbe6; border: 1px solid #e8d98b; border-radius: 8px;
    padding: 8px 11px; cursor: pointer;
    font: 12px/1.45 -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    color: #4a4324; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
  }
  .ashokan-comment-card:hover { border-color: #c9b453; box-shadow: 0 2px 7px rgba(0, 0, 0, 0.14); }
  .ashokan-comment-card-author {
    font-size: 10.5px; font-weight: 650; text-transform: uppercase;
    letter-spacing: 0.03em; color: #94812c; margin-bottom: 3px;
  }
  @media print { #ashokan-comment-rail { display: none; } }

  /* Hover chip: accept/reject a tracked change in place. */
  #ashokan-change-chip {
    display: none; position: absolute; z-index: 60; gap: 2px;
    background: rgba(250, 250, 252, 0.98); border: 1px solid #d0d5dd;
    border-radius: 7px; padding: 3px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  }
  #ashokan-change-chip button {
    width: 24px; height: 22px; border: none; border-radius: 4px;
    background: transparent; font-size: 13px; cursor: pointer; line-height: 1;
  }
  #ashokan-change-chip .ashokan-chip-accept { color: #1a7f37; }
  #ashokan-change-chip .ashokan-chip-accept:hover { background: rgba(46, 160, 67, 0.15); }
  #ashokan-change-chip .ashokan-chip-reject { color: #cf222e; }
  #ashokan-change-chip .ashokan-chip-reject:hover { background: rgba(248, 81, 73, 0.15); }
  @media print { #ashokan-change-chip { display: none !important; } }

  /* Images: selectable with a corner resize handle. */
  .ashokan-image { position: relative; display: inline-block; max-width: 100%; }
  .ashokan-image img { max-width: 100%; }
  .ashokan-image-handle { display: none; }
  .ashokan-image.ProseMirror-selectednode .ashokan-image-handle {
    display: block; position: absolute; right: -6px; bottom: -6px;
    width: 11px; height: 11px; background: #6ea8fe; border: 1.5px solid #fff;
    border-radius: 3px; cursor: nwse-resize; box-shadow: 0 0 2px rgba(0,0,0,0.4);
  }
  .resize-cursor { cursor: col-resize; }

  /* Print/PDF pagination: keep figures whole, keep headings with their text. */
  @media print {
    body { padding: 0 !important; }
    img, figure, table, pre, blockquote { break-inside: avoid; page-break-inside: avoid; }
    h1, h2, h3, h4, h5, h6 { break-after: avoid; page-break-after: avoid; }
    p, li { orphans: 2; widows: 2; }
    .ashokan-raw:hover { box-shadow: none; }
    .ashokan-image-handle, .ProseMirror-gapcursor { display: none !important; }
    .ProseMirror-selectednode { outline: none; }
    .ProseMirror { min-height: 0; }
  }
</style>
<style id="ashokan-default-theme-css">
  /* Applied only when the document brings no stylesheet of its own. */
  body.ashokan-default-theme .ProseMirror {
    font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    color: #1a1d23;
    max-width: 44em;
    margin: 0 auto;
    padding: 48px 56px 120px;
  }
  body.ashokan-default-theme .ProseMirror h1 { font-size: 1.9em; letter-spacing: -0.015em; margin: 1.2em 0 0.5em; }
  body.ashokan-default-theme .ProseMirror h2 { font-size: 1.4em; letter-spacing: -0.01em; margin: 1.4em 0 0.5em; }
  body.ashokan-default-theme .ProseMirror h3 { font-size: 1.15em; margin: 1.4em 0 0.4em; }
  body.ashokan-default-theme .ProseMirror blockquote {
    margin: 1em 0; padding: 0.1em 1.2em; border-left: 3px solid #d0d5dd; color: #5b6472;
  }
  body.ashokan-default-theme .ProseMirror pre {
    background: #f4f5f7; border: 1px solid #e4e7ec; border-radius: 8px;
    padding: 12px 16px; font: 13px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
  }
  body.ashokan-default-theme .ProseMirror code { font: 0.9em ui-monospace, "SF Mono", Menlo, monospace; background: #f4f5f7; border-radius: 4px; padding: 0.1em 0.35em; }
  body.ashokan-default-theme .ProseMirror pre code { background: none; padding: 0; }
  body.ashokan-default-theme .ProseMirror table { border-collapse: collapse; }
  body.ashokan-default-theme .ProseMirror th, body.ashokan-default-theme .ProseMirror td {
    border: 1px solid #d0d5dd; padding: 6px 12px; text-align: left;
  }
  body.ashokan-default-theme .ProseMirror th { background: #f4f5f7; }
  body.ashokan-default-theme .ProseMirror a { color: #1f6feb; }
  body.ashokan-default-theme .ProseMirror hr { border: none; border-top: 1px solid #e4e7ec; margin: 2em 0; }
</style>
</head>
<body>
<div id="ashokan-doc-styles" style="display: none"></div>
<div id="editor"></div>
<script>
__ASHOKAN_EDITOR_JS__
</script>
</body>
</html>
